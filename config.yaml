# Lane MVP - 前视camera bag → 车道识别 最小闭环配置

data:
  bag_dir: "./data/bags"
  output_dir: "./data/frames"
  keyframe_dir: "./data/keyframes"
  clip_label_file: "./data/clip_labels.csv"
  keyframe_label_file: "./data/keyframe_labels.csv"
  auto_segment_file: "./data/auto_segments.csv"
  segment_label_file: "./data/segment_labels.csv"  # 兼容旧流程
  train_manifest: "./data/train_manifest.csv"
  val_manifest: "./data/val_manifest.csv"
  val_ratio: 0.2
  split_by_clip: true
  include_review_segments: false

decode:
  front_camera_topics:
    - "/cam_1"
    - "/cam_2"
    - "/cam_3"
    - "/cam_4"
    - "/cam_5"
    - "/cam_6"
    - "/cam_7"
    - "/cam_8"
    - "/cam_9"
    - "/cam_10"
    - "/cam_11"
    - "/cam_12"
    - "/cam_13"
    - "/cam_14"
  h265_context_packets: 24
  bag_workers: 1           # bag 级并行进程数；单机建议 <= 物理核数/2，默认1保持兼容
  frame_step: 5            # 每 5 个“成功解码帧”保留 1 帧（避免包流步进导致全损坏）
  write_workers: 8         # 单 bag 内写盘线程（12C/24T + NVIDIA 推荐 6~10）
  ffmpeg_threads: 6        # 单 bag 内 ffmpeg 解码线程（多 bag 并行时建议 4~8）
  ffmpeg_hwaccel: "cuda"   # H.265 硬件解码: auto/cuda/vaapi/qsv/videotoolbox/none
  h265_decoder_mode: "legacy"  # 默认 legacy（更稳）；persistent 仍可选但建议仅在稳定性验证后启用
  h265_legacy_timeout_sec: 15.0  # legacy 模式单次 ffmpeg 超时，避免坏流导致子进程长时间阻塞
  h265_persistent_write_timeout_sec: 1.0  # persistent 写 stdin 超时（秒），避免管道反压卡住
  h265_persistent_read_timeout_sec: 1.0   # persistent 读 stdout 等待窗口（秒），默认较旧实现更宽松
  h265_decode_cooldown_packets: 8  # H.265 连续失败后冷却包数，减少高频 ffmpeg 进程调用
  frame_quality_filter_enabled: true  # 启用异常帧过滤（大面积灰色/低纹理）
  frame_quality_check_interval: 1  # 帧质量判别周期：1=每帧判别，N=每N帧判1次
  frame_phase_probe_enabled: true  # 启用“前几帧探测相位”，自动判断从哪一帧开始正常
  frame_phase_probe_frames: 20  # 启动探测帧数上限；命中正常帧后会提前锁定相位
  gray_ratio_max: 0.92            # 低饱和像素占比上限（越小越严格）
  saturation_mean_min: 16.0       # 全图平均饱和度下限（越大越严格）
  luma_std_min: 8.0               # 明度标准差下限（越大越严格）
  output_format: "jpg"
  jpeg_quality: 95
  max_frames_per_bag: null  # null = 不限制

sampling:
  total_keyframes_per_clip: 8
  center_ratio: 0.6       # 中间区域占比
  center_density: 3        # 中间区域密度倍数
  min_interval_frames: 5   # 最小帧间隔

model:
  backbone: "convnext_tiny"
  pretrained: true
  snippet_length: 4
  snippet_stride: 2
  feature_dim: 768
  mil_hidden_dim: 256
  num_direction_classes: 2   # 双向 / 单向
  num_lane_classes: 3        # 1,2,2+
  dropout: 0.3
  image_size: 224

training:
  batch_size: 4
  num_workers: 4
  epochs: 30
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 3
  direction_loss_weight: 1.0
  lane_count_loss_weight: 1.0
  save_dir: "./checkpoints"
  log_dir: "./logs"
  seed: 42

inference:
  checkpoint: "./checkpoints/best.pth"
  top_k_evidence: 5
  output_dir: "./results"
  output_file: "./results/predictions.csv"
