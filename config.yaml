# Lane MVP - 前视camera bag → 车道识别 最小闭环配置

data:
  bag_dir: "./data/bags"
  output_dir: "./data/frames"
  keyframe_dir: "./data/keyframes"
  clip_label_file: "./data/clip_labels.csv"
  keyframe_label_file: "./data/keyframe_labels.csv"
  train_manifest: "./data/train_manifest.csv"
  val_manifest: "./data/val_manifest.csv"
  val_ratio: 0.2

decode:
  front_camera_topics:
    - "/cam_1"
    - "/cam_2"
    - "/cam_3"
    - "/cam_4"
    - "/cam_5"
    - "/cam_6"
    - "/cam_7"
    - "/cam_8"
    - "/cam_9"
    - "/cam_10"
    - "/cam_11"
    - "/cam_12"
    - "/cam_13"
    - "/cam_14"
  h265_context_packets: 24
  frame_step: 5            # 每 5 个“成功解码帧”保留 1 帧（避免包流步进导致全损坏）
  write_workers: 4         # CPU 多线程写盘（12核24线程机器建议先试 8）
  ffmpeg_threads: 0        # ffmpeg 解码线程数，0=ffmpeg 自动选择（12核机器可试 8~12）
  ffmpeg_hwaccel: "auto"   # H.265 硬件解码: auto/cuda/vaapi/qsv/videotoolbox/none（NVIDIA 可设 cuda）
  output_format: "jpg"
  jpeg_quality: 95
  max_frames_per_bag: null  # null = 不限制

sampling:
  total_keyframes_per_clip: 8
  center_ratio: 0.6       # 中间区域占比
  center_density: 3        # 中间区域密度倍数
  min_interval_frames: 5   # 最小帧间隔

model:
  backbone: "convnext_tiny"
  pretrained: true
  snippet_length: 4
  snippet_stride: 2
  feature_dim: 768
  mil_hidden_dim: 256
  num_direction_classes: 2   # 双向 / 单向
  num_lane_classes: 6        # 1,2,3,4,5,6+
  dropout: 0.3
  image_size: 224

training:
  batch_size: 4
  num_workers: 4
  epochs: 30
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 3
  direction_loss_weight: 1.0
  lane_count_loss_weight: 1.0
  save_dir: "./checkpoints"
  log_dir: "./logs"
  seed: 42

inference:
  checkpoint: "./checkpoints/best.pth"
  top_k_evidence: 5
  output_dir: "./results"
  output_file: "./results/predictions.csv"
