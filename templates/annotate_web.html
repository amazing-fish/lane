<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lane MVP - Web关键帧标注</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #111; color: #eee; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .card { background: #1b1b1b; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button { background: #2b2b2b; color: #eee; border: 1px solid #555; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
    button:hover { background: #3a3a3a; }
    .imgbox { min-height: 560px; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 10px; }
    img { max-width: 100%; max-height: 560px; object-fit: contain; }
    fieldset { border: 1px solid #444; border-radius: 8px; }
    .status { color: #9fd6ff; }
    .hint { color: #9a9a9a; font-size: 12px; }
    .pill { padding: 2px 8px; border-radius: 999px; background: #2a2a2a; border: 1px solid #444; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card toolbar">
      <button id="prevBtn">← 上一张</button>
      <button id="nextBtn">下一张 →</button>
      <button id="saveBtn">保存 (Ctrl/Cmd+S)</button>
      <span class="pill" id="progress"></span>
      <span class="pill" id="labeled"></span>
      <span class="status" id="status"></span>
    </div>

    <div class="card imgbox">
      <img id="kfImg" alt="keyframe" />
    </div>

    <div class="card">
      <fieldset>
        <legend>是否双向</legend>
        <label><input type="radio" name="dir" value="yes"> yes (B)</label>
        <label><input type="radio" name="dir" value="no"> no (N)</label>
        <label><input type="radio" name="dir" value="unknown"> unknown (U)</label>
      </fieldset>
    </div>

    <div class="card">
      <fieldset>
        <legend>总车道数</legend>
        <label><input type="radio" name="lane" value="1">1</label>
        <label><input type="radio" name="lane" value="2">2</label>
        <label><input type="radio" name="lane" value="3">3</label>
        <label><input type="radio" name="lane" value="4">4</label>
        <label><input type="radio" name="lane" value="5">5</label>
        <label><input type="radio" name="lane" value="6+">6+</label>
        <label><input type="radio" name="lane" value="unknown">unknown (0)</label>
      </fieldset>
      <p class="hint">快捷键：←/A 上一张，→/D 下一张，B/N/U 设置双向，1-6 设置车道（6=6+），0=unknown，Ctrl/Cmd+S 保存。</p>
    </div>
  </div>

<script>
let state = { images: [], labels: {}, idx: 0, total: 0, labeled: 0 };

function byName(name, value) {
  const el = document.querySelector(`input[name="${name}"][value="${value}"]`);
  if (el) el.checked = true;
}

function getChecked(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : 'unknown';
}

function currentRel() {
  return state.images[state.idx] || '';
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function calcLabeled() {
  let count = 0;
  for (const key of Object.keys(state.labels)) {
    const v = state.labels[key] || {};
    if ((v.is_bidirectional && v.is_bidirectional !== 'unknown') || (v.lane_count && v.lane_count !== 'unknown')) {
      count += 1;
    }
  }
  return count;
}

function render() {
  const rel = currentRel();
  if (!rel) return;
  document.getElementById('kfImg').src = `/image/${encodeURIComponent(rel)}`;
  document.getElementById('progress').textContent = `[${state.idx + 1}/${state.total}] ${rel}`;
  document.getElementById('labeled').textContent = `已标注: ${calcLabeled()}/${state.total}`;

  const lbl = state.labels[rel] || { is_bidirectional: 'unknown', lane_count: 'unknown' };
  byName('dir', lbl.is_bidirectional || 'unknown');
  byName('lane', lbl.lane_count || 'unknown');
}

function updateLabel() {
  const rel = currentRel();
  if (!rel) return;
  state.labels[rel] = {
    is_bidirectional: getChecked('dir'),
    lane_count: getChecked('lane')
  };
}

async function saveLabels() {
  updateLabel();
  const res = await fetch('/api/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ labels: state.labels })
  });
  const data = await res.json();
  setStatus(data.message || '已保存');
  render();
}

function prev() {
  updateLabel();
  if (state.idx > 0) state.idx -= 1;
  render();
}

function next() {
  updateLabel();
  if (state.idx < state.total - 1) state.idx += 1;
  render();
}

async function init() {
  const res = await fetch('/api/state');
  state = await res.json();
  render();
}

document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('saveBtn').addEventListener('click', saveLabels);

document.querySelectorAll('input[name="dir"],input[name="lane"]').forEach(el => {
  el.addEventListener('change', () => {
    updateLabel();
    render();
  });
});

window.addEventListener('keydown', async (e) => {
  const key = e.key.toLowerCase();
  if ((e.ctrlKey || e.metaKey) && key === 's') {
    e.preventDefault();
    await saveLabels();
    return;
  }
  if (key === 'arrowleft' || key === 'a') { prev(); return; }
  if (key === 'arrowright' || key === 'd') { next(); return; }
  if (key === 'b') { byName('dir', 'yes'); updateLabel(); render(); return; }
  if (key === 'n') { byName('dir', 'no'); updateLabel(); render(); return; }
  if (key === 'u') { byName('dir', 'unknown'); updateLabel(); render(); return; }
  if ('12345'.includes(key)) { byName('lane', key); updateLabel(); render(); return; }
  if (key === '6') { byName('lane', '6+'); updateLabel(); render(); return; }
  if (key === '0') { byName('lane', 'unknown'); updateLabel(); render(); return; }
});

init();
</script>
</body>
</html>
